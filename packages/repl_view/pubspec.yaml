name: repl_view
description: >-
  REPL-style scroll view for Flutter: input lines pin as sticky section
  headers, responses scroll as leaves, and identical responses coalesce
  with a count badge.
version: 0.1.1
homepage: https://github.com/repentsinner/flutter_scroll_kit
repository: https://github.com/repentsinner/flutter_scroll_kit/tree/main/packages/repl_view
issue_tracker: https://github.com/repentsinner/flutter_scroll_kit/issues
topics:
  - scroll
  - repl
  - console
  - terminal
  - flutter

resolution: workspace

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  sticky_hierarchical_scroll: ^0.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
