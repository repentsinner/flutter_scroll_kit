include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Path dep on sticky_hierarchical_scroll is intentional until the
    # whole set publishes to pub.dev (see §road:first-publication).
    invalid_dependency: ignore
    prefer_single_quotes: error
    file_names: error
    unawaited_futures: error
    cancel_subscriptions: error
    close_sinks: error
    prefer_final_locals: error
    prefer_final_in_for_each: error
    avoid_dynamic_calls: error
    use_colored_box: error
    use_decorated_box: error
    sized_box_shrink_expand: error
    only_throw_errors: error
    avoid_type_to_string: error
    no_runtimeType_toString: error
    avoid_catching_errors: error
    avoid_catches_without_on_clauses: error
    use_enums: error
    directives_ordering: error
    prefer_final_fields: error
    prefer_const_declarations: error
    avoid_redundant_argument_values: error
    always_declare_return_types: error
    exhaustive_cases: error
    no_default_cases: error
    cast_nullable_to_non_nullable: error
    parameter_assignments: error
    avoid_void_async: error
    unnecessary_late: error
    prefer_const_constructors: error
    prefer_asserts_with_message: error

linter:
  rules:
    - prefer_single_quotes
    - file_names
    - unawaited_futures
    - cancel_subscriptions
    - close_sinks
    - prefer_final_locals
    - prefer_final_in_for_each
    - avoid_dynamic_calls
    - use_colored_box
    - use_decorated_box
    - sized_box_shrink_expand
    - only_throw_errors
    - avoid_type_to_string
    - no_runtimeType_toString
    - avoid_catching_errors
    - avoid_catches_without_on_clauses
    - use_enums
    - directives_ordering
    - prefer_final_fields
    - prefer_const_declarations
    - avoid_redundant_argument_values
    - always_declare_return_types
    - exhaustive_cases
    - no_default_cases
    - cast_nullable_to_non_nullable
    - parameter_assignments
    - avoid_void_async
    - unnecessary_late
    - prefer_const_constructors
    - prefer_asserts_with_message
