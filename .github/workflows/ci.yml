name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: dart pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Test
        run: |
          set -e
          for pkg in packages/*/; do
            if [ -d "$pkg/test" ]; then
              echo "::group::flutter test $pkg"
              (cd "$pkg" && flutter test)
              echo "::endgroup::"
            fi
          done

  publish-dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        # fixed_line_view and repl_view carry path dependencies on
        # sibling packages until §road:pubspec-publish-prep converts
        # them to hosted sources. dart pub publish --dry-run rejects
        # path deps, so those packages join the matrix once that
        # workstream lands.
        package:
          - line_snap_scroll_physics
          - sticky_hierarchical_scroll

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: dart pub get

      - name: Dry-run publish ${{ matrix.package }}
        working-directory: packages/${{ matrix.package }}
        run: dart pub publish --dry-run
