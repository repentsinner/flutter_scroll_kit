name: Publish sticky_hierarchical_scroll

# Publishes packages/sticky_hierarchical_scroll to pub.dev when
# release-please pushes a sticky_hierarchical_scroll-vX.Y.Z tag.
# Authentication is OIDC via pub.dev trusted publishing — no secrets.
# Requires one-time trusted-publisher registration on the package's
# pub.dev Admin page (repo + tag pattern sticky_hierarchical_scroll-v{{version}}).
on:
  push:
    tags:
      - 'sticky_hierarchical_scroll-v[0-9]+.[0-9]+.[0-9]+'

# Serialize all four publish workflows so simultaneous tag bursts do
# not race; cancel-in-progress: false lets every queued publish run.
concurrency:
  group: publish-pub-dev
  cancel-in-progress: false

jobs:
  publish:
    permissions:
      id-token: write # mint the short-lived OIDC token pub.dev verifies
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    with:
      working-directory: packages/sticky_hierarchical_scroll
