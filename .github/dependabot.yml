version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - github-actions
    groups:
      github-actions:
        patterns: ["*"]

  # Dart 3.6+ workspace: dependency_services rejects per-package
  # invocations with "Only apply dependency_services to the root of
  # the workspace." The root entry covers all workspace members via
  # the shared pubspec.lock.
  - package-ecosystem: pub
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
      - dart
    groups:
      dart-deps:
        patterns: ["*"]
